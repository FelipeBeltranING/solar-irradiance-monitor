# MQTT broker configuration for the Solar Irradiance Monitor project.

listener 1883
protocol mqtt

listener 9001
protocol websockets

# Allow connections without authentication for local development.
# For production, configure password_file and disable this.
allow_anonymous true

persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_timestamp true
connection_messages true